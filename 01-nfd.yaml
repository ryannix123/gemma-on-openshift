---
# NodeFeatureDiscovery CR. Assumes you've already installed the
# Node Feature Discovery Operator from OperatorHub into the
# openshift-nfd namespace. This CR tells NFD to start labeling nodes
# with hardware features it detects, including PCI device IDs which
# is what the NVIDIA GPU Operator looks for.
#
# After applying, verify with:
#   oc get nodes -o json | jq '.items[].metadata.labels' | grep 10de
# You should see feature.node.kubernetes.io/pci-10de.present=true
# (10de is NVIDIA's PCI vendor ID).
apiVersion: nfd.openshift.io/v1
kind: NodeFeatureDiscovery
metadata:
  name: nfd-instance
  namespace: openshift-nfd
spec:
  operand:
    image: registry.redhat.io/openshift4/ose-node-feature-discovery-rhel9:v4.19
    imagePullPolicy: IfNotPresent
    servicePort: 12000
  workerConfig:
    configData: |
      core:
        sleepInterval: 60s
      sources:
        pci:
          deviceClassWhitelist:
            - "0200"
            - "03"
            - "12"
          deviceLabelFields:
            - "vendor"
