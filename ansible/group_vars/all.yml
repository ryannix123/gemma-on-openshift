---
# group_vars/all.yml — Variables for the OLS + self-hosted LLM playbook.

# ---------------------------------------------------------------------------
# Manifest paths
# ---------------------------------------------------------------------------
manifests_dir: "{{ playbook_dir }}/../manifests"

# ---------------------------------------------------------------------------
# Model and namespace configuration
# ---------------------------------------------------------------------------
serving_namespace: "llm-serving"
inferenceservice_name: "granite-41-3b"
served_model_name: "granite-41-3b"

# ---------------------------------------------------------------------------
# NVIDIA PCI vendor ID (always 10de for NVIDIA GPUs)
# ---------------------------------------------------------------------------
nvidia_pci_vendor_id: "10de"

# ---------------------------------------------------------------------------
# Known GPU device IDs → human-readable names.
# Add your GPU here if it's not listed and the playbook reports
# "Unknown NVIDIA GPU." The device ID is the 4-hex-char value after
# 10de: in lspci output (e.g. [10de:2489]).
# ---------------------------------------------------------------------------
known_gpu_models:
  "2484": "RTX 3070"
  "2486": "RTX 3060 Ti"
  "2487": "RTX 3060"
  "2489": "RTX 3060 Ti (Lite Hash Rate)"
  "2684": "RTX 4090"
  "2704": "RTX 4080"
  "2782": "RTX 4070 Ti"
  "2786": "RTX 4060 Ti"
  "27a0": "RTX 4080 Laptop"
  "26b1": "RTX 3060 Laptop"
  "2230": "RTX 3080 Ti Laptop"
  "20b0": "A100-SXM4-40GB"
  "20b2": "A100-SXM4-80GB"
  "20f1": "A100-PCIe-40GB"
  "2236": "A10G"
  "26b9": "L40S"
  "26b5": "L40"
  "27b8": "L4"

# ---------------------------------------------------------------------------
# Timeouts (seconds). Tune these for your environment. The driver build
# is by far the longest — 900s covers a first-time compile on a consumer
# GPU kernel. Subsequent runs (driver already cached) are much faster.
# ---------------------------------------------------------------------------
timeout_driver_build: 900
timeout_operator_ready: 300
timeout_pod_ready: 600
