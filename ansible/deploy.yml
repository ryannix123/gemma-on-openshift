---
# deploy.yml - Deploy OpenShift Lightspeed with a self-hosted LLM on SNO.
#
# This playbook uses ONLY the `oc` command -- no SSH, no kubernetes.core
# collection, no Python Kubernetes library. Works anywhere `oc` works
# and you're already logged in.
#
# Prerequisites:
#   - The four operators below must already be installed (manually from
#     OperatorHub):
#       * Node Feature Discovery Operator
#       * NVIDIA GPU Operator
#       * Red Hat OpenShift AI Operator
#       * OpenShift Lightspeed Operator
#   - `oc` CLI in PATH, already logged in as cluster-admin
#   - ansible-core 2.14+
#   - The OCI model image already built and pushed to Quay
#     (see ../build.sh)
#
# Usage:
#   ansible-playbook -i inventory/hosts.ini deploy.yml
#
# Tags (run just one phase):
#   --tags detect    -- GPU detection only
#   --tags gpu       -- NFD + GPU Operator + CUDA validation
#   --tags rhoai     -- DataScienceCluster
#   --tags model     -- Namespace + ServingRuntime + InferenceService
#   --tags ols       -- OLS secret + OLSConfig
#   --tags validate  -- Smoke tests + summary only

- name: "Deploy OpenShift Lightspeed with Self-Hosted LLM"
  hosts: local
  gather_facts: false

  tasks:

    ############################################################################
    # PREFLIGHT
    ############################################################################

    - name: "Preflight | Verify oc is in PATH"
      ansible.builtin.command:
        cmd: oc version --client=true -o json
      register: oc_version
      changed_when: false
      failed_when: oc_version.rc != 0
      tags: [always]

    - name: "Preflight | Verify logged in"
      ansible.builtin.command:
        cmd: oc whoami
      register: oc_whoami
      changed_when: false
      failed_when: oc_whoami.rc != 0
      tags: [always]

    - name: "Preflight | Show current user and cluster"
      ansible.builtin.command:
        cmd: "{{ item }}"
      register: cluster_info
      changed_when: false
      loop:
        - "oc whoami"
        - "oc whoami --show-server"
      tags: [always]

    - name: "Preflight | Display cluster context"
      ansible.builtin.debug:
        msg:
          - "Logged in as: {{ cluster_info.results[0].stdout }}"
          - "Cluster:      {{ cluster_info.results[1].stdout }}"
      tags: [always]

    - name: "Preflight | Verify required operator CRDs are installed"
      ansible.builtin.command:
        cmd: "oc get crd {{ item }}"
      register: crd_check
      changed_when: false
      failed_when: false
      loop:
        - "nodefeaturediscoveries.nfd.openshift.io"
        - "clusterpolicies.nvidia.com"
        - "datascienceclusters.datasciencecluster.opendatahub.io"
        - "olsconfigs.ols.openshift.io"
      tags: [always]

    - name: "Preflight | Fail with helpful message if any operator CRD is missing"
      ansible.builtin.fail:
        msg: |
          One or more required operators are not installed on this cluster.

          Missing CRDs:
          {% for r in crd_check.results %}{% if r.rc != 0 %}  - {{ r.item }}
          {% endif %}{% endfor %}

          Install the following from OperatorHub:
            - Node Feature Discovery Operator
            - NVIDIA GPU Operator
            - Red Hat OpenShift AI
            - OpenShift Lightspeed Operator

          Once all four show Succeeded in Installed Operators, re-run:
            ansible-playbook -i inventory/hosts.ini deploy.yml
      when: crd_check.results | selectattr('rc', 'ne', 0) | list | length > 0
      tags: [always]


    ############################################################################
    # PHASE 0: Detect the GPU on the SNO node using `oc debug node`.
    ############################################################################

    - name: "Phase 0 | Get the SNO node name"
      ansible.builtin.command:
        cmd: oc get nodes -o jsonpath={.items[0].metadata.name}
      register: node_name
      changed_when: false
      tags: [detect, gpu]

    - name: "Phase 0 | Run lspci on the node via oc debug"
      ansible.builtin.shell:
        cmd: >
          oc debug node/{{ node_name.stdout }} --quiet --
          chroot /host lspci -nn 2>/dev/null | grep -iE 'vga|3d|display' || true
      register: lspci_output
      changed_when: false
      tags: [detect, gpu]

    - name: "Phase 0 | Show raw lspci output"
      ansible.builtin.debug:
        msg: "{{ lspci_output.stdout_lines }}"
      tags: [detect, gpu]

    - name: "Phase 0 | Parse NVIDIA device IDs from lspci output"
      ansible.builtin.set_fact:
        nvidia_devices: "{{ nvidia_devices | default([]) + [ item | regex_search('\\[' + nvidia_pci_vendor_id + ':([0-9a-f]{4})\\]', '\\1') | first ] }}"
      loop: "{{ lspci_output.stdout_lines }}"
      when:
        - item is search('(?i)nvidia')
        - item is search('\[' + nvidia_pci_vendor_id + ':[0-9a-f]{4}\]')
      tags: [detect, gpu]

    - name: "Phase 0 | Fail if no NVIDIA GPU detected"
      ansible.builtin.fail:
        msg: |
          No NVIDIA GPU detected on node {{ node_name.stdout }}.

          This playbook requires an NVIDIA GPU for LLM inference.
          Verify the GPU is installed and visible:
            oc debug node/{{ node_name.stdout }} -- chroot /host lspci -nn | grep -i nvidia
      when: (nvidia_devices | default([])) | length == 0
      tags: [detect, gpu]

    - name: "Phase 0 | Identify detected GPU model"
      ansible.builtin.set_fact:
        detected_gpu_id: "{{ nvidia_devices[0] }}"
        detected_gpu_name: "{{ known_gpu_models[nvidia_devices[0]] | default('Unknown NVIDIA GPU (device ID: ' + nvidia_devices[0] + ')') }}"
        gpu_detected: true
      tags: [detect, gpu]

    - name: "Phase 0 | Display detected GPU"
      ansible.builtin.debug:
        msg:
          - "✓ NVIDIA GPU detected: {{ detected_gpu_name }}"
          - "  Node:          {{ node_name.stdout }}"
          - "  PCI device ID: {{ nvidia_pci_vendor_id }}:{{ detected_gpu_id }}"
      tags: [detect, gpu]

    - name: "Phase 0 | Warn on consumer GPUs"
      ansible.builtin.debug:
        msg: |
          ⚠ NOTE: {{ detected_gpu_name }} is a consumer GPU. If the
          nvidia-driver-daemonset CrashLoops during Phase 1, you may
          need to pin driver.version in manifests/02-gpu-clusterpolicy.yaml.
      when: detected_gpu_id in ['2484', '2486', '2487', '2489']
      tags: [detect, gpu]


    ############################################################################
    # PHASE 1: GPU plumbing — NFD, GPU Operator ClusterPolicy, CUDA validation.
    ############################################################################

    - name: "Phase 1 | Apply NodeFeatureDiscovery CR"
      ansible.builtin.command:
        cmd: "oc apply -f {{ manifests_dir }}/01-nfd.yaml"
      register: nfd_apply
      changed_when: "'unchanged' not in nfd_apply.stdout"
      tags: [gpu]

    - name: "Phase 1 | Wait for NFD to label the node with NVIDIA PCI presence"
      ansible.builtin.shell:
        cmd: >
          oc get node {{ node_name.stdout }}
          -o jsonpath='{.metadata.labels.feature\.node\.kubernetes\.io/pci-{{ nvidia_pci_vendor_id }}\.present}'
      register: nfd_label
      changed_when: false
      until: nfd_label.stdout == "true"
      retries: 18
      delay: 10
      tags: [gpu]

    - name: "Phase 1 | Apply NVIDIA GPU Operator ClusterPolicy"
      ansible.builtin.command:
        cmd: "oc apply -f {{ manifests_dir }}/02-gpu-clusterpolicy.yaml"
      register: gpu_apply
      changed_when: "'unchanged' not in gpu_apply.stdout"
      tags: [gpu]

    - name: "Phase 1 | Wait for nvidia-driver pod to exist"
      ansible.builtin.command:
        cmd: >
          oc get pod -n nvidia-gpu-operator
          -l app.kubernetes.io/component=nvidia-driver
          -o jsonpath={.items[0].metadata.name}
      register: driver_pod_exists
      changed_when: false
      until: driver_pod_exists.rc == 0 and driver_pod_exists.stdout | length > 0
      retries: 30
      delay: 10
      tags: [gpu]

    - name: "Phase 1 | Wait for nvidia-driver pod to be Ready"
      ansible.builtin.command:
        cmd: >
          oc wait --for=condition=Ready pod
          -l app.kubernetes.io/component=nvidia-driver
          -n nvidia-gpu-operator
          --timeout={{ timeout_driver_build }}s
      changed_when: false
      tags: [gpu]

    - name: "Phase 1 | Wait for nvidia-device-plugin pod to exist"
      ansible.builtin.command:
        cmd: >
          oc get pod -n nvidia-gpu-operator
          -l app=nvidia-device-plugin-daemonset
          -o jsonpath={.items[0].metadata.name}
      register: device_plugin_exists
      changed_when: false
      until: device_plugin_exists.rc == 0 and device_plugin_exists.stdout | length > 0
      retries: 30
      delay: 10
      tags: [gpu]

    - name: "Phase 1 | Wait for nvidia-device-plugin pod to be Ready"
      ansible.builtin.command:
        cmd: >
          oc wait --for=condition=Ready pod
          -l app=nvidia-device-plugin-daemonset
          -n nvidia-gpu-operator
          --timeout=300s
      changed_when: false
      tags: [gpu]

    - name: "Phase 1 | Check GPU Operator CUDA validator status"
      ansible.builtin.command:
        cmd: >
          oc get pod -n nvidia-gpu-operator
          -l app=nvidia-cuda-validator
          -o jsonpath={.items[0].status.phase}
      register: cuda_validator_phase
      changed_when: false
      failed_when: false
      tags: [gpu]

    - name: "Phase 1 | Report GPU Operator validation status"
      ansible.builtin.debug:
        msg: >-
          GPU Operator's built-in CUDA validator phase:
          {{ cuda_validator_phase.stdout | default('(not found)') }}
          {% if cuda_validator_phase.stdout == 'Succeeded' %}
          ✓ GPU already validated by the GPU Operator itself.
          {% endif %}
      tags: [gpu]


    ############################################################################
    # PHASE 2: RHOAI DataScienceCluster.
    ############################################################################

    - name: "Phase 2 | Apply DataScienceCluster"
      ansible.builtin.command:
        cmd: "oc apply -f {{ manifests_dir }}/03-dsc.yaml"
      register: dsc_apply
      changed_when: "'unchanged' not in dsc_apply.stdout"
      tags: [rhoai]

    - name: "Phase 2 | Wait for KServe controller to be Ready"
      ansible.builtin.command:
        cmd: >
          oc wait --for=condition=Ready pod
          -l control-plane=kserve-controller-manager
          -n redhat-ods-applications
          --timeout={{ timeout_operator_ready }}s
      changed_when: false
      tags: [rhoai]


    ############################################################################
    # PHASE 3: Namespace, ServingRuntime, InferenceService.
    ############################################################################

    - name: "Phase 3 | Apply llm-serving namespace"
      ansible.builtin.command:
        cmd: "oc apply -f {{ manifests_dir }}/00-namespace.yaml"
      register: ns_apply
      changed_when: "'unchanged' not in ns_apply.stdout"
      tags: [model]

    - name: "Phase 3 | Apply vLLM ServingRuntime"
      ansible.builtin.command:
        cmd: "oc apply -f {{ manifests_dir }}/04-servingruntime.yaml"
      register: sr_apply
      changed_when: "'unchanged' not in sr_apply.stdout"
      tags: [model]

    - name: "Phase 3 | Apply InferenceService"
      ansible.builtin.command:
        cmd: "oc apply -f {{ manifests_dir }}/05-inferenceservice.yaml"
      register: isvc_apply
      changed_when: "'unchanged' not in isvc_apply.stdout"
      tags: [model]

    - name: "Phase 3 | Wait for predictor pod to be Ready (5-10 min for OCI pull + model load)"
      ansible.builtin.command:
        cmd: >
          oc wait --for=condition=Ready pod
          -l serving.kserve.io/inferenceservice={{ inferenceservice_name }}
          -n {{ serving_namespace }}
          --timeout={{ timeout_pod_ready }}s
      changed_when: false
      tags: [model]

    - name: "Phase 3 | Get predictor pod name"
      ansible.builtin.command:
        cmd: >
          oc get pod -n {{ serving_namespace }}
          -l serving.kserve.io/inferenceservice={{ inferenceservice_name }}
          -o jsonpath={.items[0].metadata.name}
      register: predictor_pod
      changed_when: false
      tags: [model, validate]

    - name: "Phase 3 | Smoke test the predictor directly"
      ansible.builtin.shell:
        cmd: >
          oc exec -n {{ serving_namespace }} {{ predictor_pod.stdout }} -c kserve-container --
          curl -sS -m 30 -X POST http://localhost:8080/v1/chat/completions
          -H 'Content-Type: application/json'
          -d '{"model":"{{ served_model_name }}","messages":[{"role":"user","content":"Say OK"}],"max_tokens":10}'
      register: smoke_test
      changed_when: false
      failed_when:
        - smoke_test.rc != 0 or 'choices' not in smoke_test.stdout
      tags: [model, validate]

    - name: "Phase 3 | Show smoke test response"
      ansible.builtin.debug:
        msg: "{{ smoke_test.stdout }}"
      tags: [model, validate]


    ############################################################################
    # PHASE 4: OpenShift Lightspeed wiring.
    ############################################################################

    - name: "Phase 4 | Apply OLS credentials secret"
      ansible.builtin.command:
        cmd: "oc apply -f {{ manifests_dir }}/06-ols-secret.yaml"
      register: secret_apply
      changed_when: "'unchanged' not in secret_apply.stdout"
      tags: [ols]

    - name: "Phase 4 | Apply OLSConfig"
      ansible.builtin.command:
        cmd: "oc apply -f {{ manifests_dir }}/07-olsconfig.yaml"
      register: ols_apply
      changed_when: "'unchanged' not in ols_apply.stdout"
      tags: [ols]

    - name: "Phase 4 | Wait for lightspeed-app-server to be Ready"
      ansible.builtin.command:
        cmd: >
          oc wait --for=condition=Ready pod
          -l app.kubernetes.io/component=lightspeed-service-api
          -n openshift-lightspeed
          --timeout={{ timeout_pod_ready }}s
      changed_when: false
      tags: [ols]


    ############################################################################
    # PHASE 5: Final validation and summary.
    ############################################################################

    - name: "Phase 5 | Get OLS console route"
      ansible.builtin.command:
        cmd: >
          oc get route console -n openshift-console
          -o jsonpath={.spec.host}
      register: console_host
      changed_when: false
      tags: [validate]

    - name: "Phase 5 | Print success summary"
      ansible.builtin.debug:
        msg:
          - "════════════════════════════════════════════════════════════"
          - "✓ OpenShift Lightspeed + Self-Hosted LLM deployment complete"
          - "════════════════════════════════════════════════════════════"
          - "GPU:          {{ detected_gpu_name | default('(not detected this run)') }}"
          - "Model:        {{ served_model_name }}"
          - "Predictor:    {{ inferenceservice_name }}-predictor.{{ serving_namespace }}.svc:8080"
          - "OLS console:  https://{{ console_host.stdout }}"
          - "════════════════════════════════════════════════════════════"
          - "Next steps:"
          - "  1. Open the console URL above"
          - "  2. Click the Lightspeed sparkle icon (top-right)"
          - "  3. Ask: 'How do I create a PVC with the LVM storage class?'"
          - "  4. Watch vLLM logs:"
          - "       oc -n {{ serving_namespace }} logs -f deployment/{{ inferenceservice_name }}-predictor"
          - "════════════════════════════════════════════════════════════"
      tags: [validate]
