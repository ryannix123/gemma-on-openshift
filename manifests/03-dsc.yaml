---
# 03-dsc.yaml — RHOAI 3.x DataScienceCluster, trimmed for SNO.
#
# API version changed from v1 to v2 in RHOAI 3.0.
# Many new components added (Llama Stack, Feast, MLflow, Trainer, NIM, etc.)
# All non-essential components set to Removed to minimize SNO footprint.
#
# Only KServe and the dashboard are Managed. Everything else is Removed.
# Enable additional components as needed for your use case.
#
# Apply:
#   oc apply -f manifests/03-dsc.yaml

apiVersion: datasciencecluster.opendatahub.io/v2
kind: DataScienceCluster
metadata:
  name: default-dsc
  labels:
    app.kubernetes.io/name: datasciencecluster
spec:
  components:

    # -- KServe: Required for model serving --------------------------------
    kserve:
      managementState: Managed
      rawDeploymentServiceConfig: Headless
      # NIM integration (NVIDIA Inference Microservices) — not needed for
      # self-hosted vLLM serving
      nim:
        managementState: Removed
      # Models-as-a-Service — cloud-hosted model endpoints, not needed
      modelsAsService:
        managementState: Removed

    # -- Dashboard: RHOAI web UI -------------------------------------------
    dashboard:
      managementState: Managed

    # -- Everything below is Removed to minimize SNO footprint -------------

    # Model Registry — useful for MLOps, but adds overhead on SNO
    modelregistry:
      managementState: Removed

    # Llama Stack operator — Llama Stack Distribution for Meta models
    llamastackoperator:
      managementState: Removed

    # Feast operator — feature store
    feastoperator:
      managementState: Removed

    # MLflow operator — experiment tracking
    mlflowoperator:
      managementState: Removed

    # TrustyAI — model explainability and fairness
    trustyai:
      managementState: Removed

    # Data Science Pipelines (Tekton/Argo-based)
    datasciencepipelines:
      managementState: Removed

    # Workbenches (Jupyter notebooks)
    workbenches:
      managementState: Removed

    # CodeFlare — distributed compute orchestration
    codeflare:
      managementState: Removed

    # Ray — distributed compute framework
    ray:
      managementState: Removed

    # Kueue — job queuing for batch workloads
    kueue:
      managementState: Removed

    # Training operator — distributed model training
    trainer:
      managementState: Removed

    # ModelMesh — multi-model serving (we use single-model KServe)
    modelmeshserving:
      managementState: Removed
