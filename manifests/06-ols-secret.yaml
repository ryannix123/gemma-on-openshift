---
# Placeholder credentials secret for OLS.
#
# vLLM's OpenAI-compatible server in this configuration doesn't require
# auth, but the OLS provider schema requires a credentialsSecretRef.
# We provide a dummy token to satisfy the schema. The vLLM container
# will accept any bearer token (or no token) since we didn't pass
# --api-key on the runtime args.
#
# If you later want real auth between OLS and vLLM, add --api-key to
# the ServingRuntime args and put the matching value here.
apiVersion: v1
kind: Secret
metadata:
  name: gemma-creds
  namespace: openshift-lightspeed
type: Opaque
stringData:
  apitoken: "placeholder-not-validated-by-vllm"
