---
# Configuration for the OLS + Gemma 4 deployment.
# Override any of these on the command line with -e, e.g.:
#   ansible-playbook deploy.yml -e "timeout_driver_build=1800"

# Path to the directory containing the YAML manifests (00-namespace.yaml, etc.).
# Defaults to ../manifests relative to this ansible/ folder.
manifests_dir: "{{ playbook_dir }}/../manifests"

# NVIDIA PCI vendor ID. Don't change this unless you switched to AMD
# (in which case this whole playbook needs rework).
nvidia_pci_vendor_id: "10de"

# Friendly names for GPU models we expect to find. Used only for
# pretty-printing the detection result. Not an allowlist -- the
# playbook proceeds for any NVIDIA GPU, not just ones in this map.
known_gpu_models:
  "2484": "RTX 3070"
  "2486": "RTX 3060 Ti"
  "2487": "RTX 3060"
  "27b8": "L4"
  "26b9": "L40S"
  "2330": "H100"
  "2321": "H100 NVL"

# How long to wait for long-running operations (seconds).
# Driver build is the slowest step; 900s (15 min) is generous.
timeout_driver_build: 900
timeout_pod_ready: 600
timeout_operator_ready: 300
