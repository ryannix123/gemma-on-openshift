---
# 00-namespace.yaml
#
# Namespace for model serving workloads. The InferenceService and
# ServingRuntime live here; KServe reconciles them from the RHOAI
# platform namespace (redhat-ods-applications).
#
# The namespace is intentionally separate from the RHOAI platform
# to provide RBAC isolation, cost attribution via `oc adm top pod`,
# and a clean multi-model story (one namespace per model or use case).

apiVersion: v1
kind: Namespace
metadata:
  name: llm-serving
  labels:
    opendatahub.io/dashboard: "true"
  annotations:
    openshift.io/description: "Self-hosted LLM serving for OpenShift Lightspeed"
    openshift.io/display-name: "LLM Serving"
