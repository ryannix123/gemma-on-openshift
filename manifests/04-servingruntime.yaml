---
# 04-servingruntime.yaml — vLLM ServingRuntime for Granite 4.1
#
# Annotations follow the RHOAI pre-installed runtime pattern to
# maximize dashboard integration (metrics, hardware profiles).

apiVersion: serving.kserve.io/v1alpha1
kind: ServingRuntime
metadata:
  name: vllm-granite
  namespace: llm-serving
  labels:
    opendatahub.io/dashboard: "true"
  annotations:
    opendatahub.io/accelerator-name: ""
    opendatahub.io/apiProtocol: REST
    opendatahub.io/recommended-accelerators: '["nvidia.com/gpu"]'
    opendatahub.io/template-display-name: vLLM NVIDIA GPU ServingRuntime for KServe
    opendatahub.io/template-name: vllm-cuda-runtime
    openshift.io/display-name: "vLLM ServingRuntime for Granite 4.1"
spec:
  multiModel: false
  supportedModelFormats:
    - autoSelect: true
      name: vLLM
  containers:
    - name: kserve-container
      image: registry.redhat.io/rhoai/odh-vllm-cuda-rhel9@sha256:9302ffc252b8681317b4d40ce8b4e66a5db3511f08f6a1ff6d34e595023f85c5
      command:
        - python
        - -m
        - vllm.entrypoints.openai.api_server
      args:
        - "--port=8080"
        - "--model=/mnt/models"
        - "--served-model-name=granite-41-3b"
        - "--max-model-len=9216"
        - "--max-num-seqs=4"
        - "--gpu-memory-utilization=0.95"
        - "--enforce-eager"
        - "--enable-auto-tool-choice"
        - "--tool-call-parser=granite"
      env:
        - name: HF_HUB_OFFLINE
          value: "1"
        - name: MODEL_INIT_MODE
          value: "async"
      ports:
        - containerPort: 8080
          protocol: TCP
      resources:
        requests:
          cpu: "4"
          memory: 12Gi
          nvidia.com/gpu: "1"
        limits:
          cpu: "8"
          memory: 16Gi
          nvidia.com/gpu: "1"
      livenessProbe:
        httpGet:
          path: /health
          port: 8080
        initialDelaySeconds: 120
        periodSeconds: 30
        failureThreshold: 3
        timeoutSeconds: 1
      readinessProbe:
        httpGet:
          path: /health
          port: 8080
        initialDelaySeconds: 60
        periodSeconds: 10
        failureThreshold: 3
        timeoutSeconds: 1
