---
# test-questions.yml — Synthetic questions for validating OLS + Granite 4.1.
#
# Each question has:
#   - question: The prompt sent to OLS
#   - category: Grouping for the report (create, troubleshoot, configure, explain)
#   - difficulty: easy, medium, hard
#   - expected_keywords: Terms the answer MUST contain (at least N of them)
#   - min_keyword_hits: Minimum number of expected_keywords that must appear
#   - anti_keywords: Terms that indicate hallucination or wrong answers
#   - min_response_length: Minimum character count (too short = "I don't know")
#   - max_response_length: Maximum character count (too long = rambling)

questions:

